# Netlify Root Configuration (Overrides UI Settings)

[build]
  # Tell Netlify to go into the frontend folder to install and build
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  # Redirect and proxy all API calls to the Render backend to prevent CORS issues
  from = "/api/*"
  to = "https://syg-esports-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  # Support React Router client-side routing on page refresh
  from = "/*"
  to = "/index.html"
  status = 200
